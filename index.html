<!DOCTYPE html>
<html>
<head>
    <title>Love Login Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .pink-bg {
            background: #ffe4ec !important;
        }

        .login-box {
            width: 320px;
            padding: 25px;
            background: white;
            margin: 100px auto;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 2px solid #ccc;
        }

        /* ✅ BUTTON FIX */
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: auto;
            display: inline-block;
        }

        .hidden {
            display: none;
        }

        img {
            width: 200px;
            margin-top: 20px;
            border-radius: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #extraText {
            margin-top: 15px;
            font-size: 16px;
            display: none; /* ✅ initially hidden */
        }
    </style>
</head>

<body>

<div class="login-box" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button type="button" onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
</div>

<div id="welcomeBox" class="hidden">
    <h2 id="welcomeText"></h2>

    <img src="photo.jpeg"><br>

    <!-- ✅ BUTTON stays same -->
    <button onclick="content()">Click Me</button>

    <!-- ✅ TEXT BELOW BUTTON -->
    <p id="extraText"></p>
</div>

<script>
function login() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "sivacharitha" && pass === "30032004") {

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("welcomeBox").classList.remove("hidden");

        document.body.classList.add("pink-bg");

        document.getElementById("welcomeText").innerHTML =
        "Wish you many more happy returns of the day " +
        "<span style='color:#ff4081; font-weight:bold;'>Siva Charitha</span> 🎉🎂";

    } else {
        document.getElementById("error").innerText = "Invalid credentials!";
    }
}

/* ✅ FIXED FUNCTION */
function content() {
    let text = document.getElementById("extraText");

    text.style.display = "block"; // show text

    text.innerHTML =
        "I Love four days: " +
        "<span style='color:pink'>spring</span>, " +
        "<span style='color:orange'>summer</span>, " +
        "<span style='color:brown'>autumn</span>, " +
        "<span style='color:blue'>winter</span><br>" +

        "I Love three days: <span style='color:purple'>yesterday, today, tomorrow</span><br>" +
        "I Love two days: <span style='color:green'>day, night</span><br>" +
        "I Love one day: <span style='color:#ff4081'>Everyday</span> ❤️";
}
</script>

</body>
</html>
