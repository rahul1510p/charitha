<!DOCTYPE html>
<html>
<head>
    <title>Love Login Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        /* After login pink background */
        .pink-bg {
            background: #ffe4ec !important;
        }

        .login-box {
            width: 320px;
            padding: 25px;
            background: white;
            margin: 100px auto;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 2px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: auto;
        }

        /* Small buttons */
        #clickBtn {
            width: 90px;
        }

        #surpriseBtn {
            width: 140px;
        }

        .hidden {
            display: none;
        }

        img {
            width: 200px;
            margin-top: 15px;
            border-radius: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #extraText {
            margin-top: 15px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- Login -->
<div class="login-box" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button type="button" onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
</div>

<!-- Welcome -->
<div id="welcomeBox" class="hidden">
    <h2 id="welcomeText"></h2>

    <img src="photo.jpeg"><br>

    <!-- Click Me button -->
    <button id="clickBtn" onclick="content()">Click Me</button>

    <!-- Text -->
    <p id="extraText"></p>

    <!-- Surprise button (hidden initially) -->
    <button id="surpriseBtn" class="hidden" onclick="showImage()">Surprise for You</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "sivacharitha" && pass === "30032004") {

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("welcomeBox").classList.remove("hidden");

        document.body.classList.add("pink-bg");

        document.getElementById("welcomeText").innerHTML =
        "Wish you many more happy returns of the day " +
        "<span style='color:#ff4081; font-weight:bold;'>Siva Charitha</span> 🎉🎂";

    } else {
        document.getElementById("error").innerText = "Invalid credentials!";
    }
}

/* Click Me */
function content() {
    document.getElementById("clickBtn").style.display = "none";

    document.getElementById("extraText").innerHTML =
        "Can you be friend for four days: " +
        "<span style='color:pink'>spring</span>, " +
        "<span style='color:orange'>summer</span>, " +
        "<span style='color:brown'>autumn</span>, " +
        "<span style='color:blue'>winter</span><br>" +

        "Can you be friend for three days: <span style='color:purple'>yesterday, today, tomorrow</span><br>" +
        "Can you be friend for two days: <span style='color:green'>day, night</span><br>" +
        "Can you be friend for one day: <span style='color:#ff4081'>Everyday</span> ❤️";

    /* Show surprise button */
    document.getElementById("surpriseBtn").classList.remove("hidden");
}

/* Surprise */
function showImage() {
    document.getElementById("surpriseBtn").style.display = "none";

    let img = document.createElement("img");
    img.src = "photo.jpeg";

    document.getElementById("welcomeBox").appendChild(img);
}
</script>

</body>
</html>
